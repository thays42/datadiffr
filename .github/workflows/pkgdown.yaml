# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
#
# Deploys via GitHub's native Pages actions (Settings > Pages > Source:
# "GitHub Actions"), NOT the legacy gh-pages branch publisher, which flaked
# repeatedly with "Deployment failed, try again later".
on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; do not cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgdown
            local::.
          needs: website

      # dev/build-site.R hides internal root .md files (CLAUDE.md, TODO.md,
      # ...) from pkgdown, which would otherwise publish them as site pages.
      - name: Build site
        run: Rscript dev/build-site.R

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages 🚀
        if: github.event_name != 'pull_request'
        id: deployment
        uses: actions/deploy-pages@v4
